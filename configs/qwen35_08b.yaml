# Qwen3.5-0.8B — Hybrid Tiny Model Agentic SFT
#
# Architecture: 0.8B params, HYBRID attention (Gated DeltaNet + Gated Attention)
#   - Pattern: 6 x (3 DeltaNet blocks + 1 Attention block) = 24 blocks
#   - 3:1 ratio: linear attention (cheap, O(n)) to full attention (O(n^2))
#   - Hidden: 1024, Intermediate: 3584
#   - Vocab: 151,936
#   - Context: 128K (hybrid enables long context at low cost)
#   - Released Feb 2026, multimodal (text + image)
#
# Memory: 0.8B * 2 = 1.6 GB params, optimizer ~6.4 GB
#   Total ~10 GB -> fits on RTX 3060 12GB, any modern GPU
#
# HYBRID ARCHITECTURE TRAINING NOTES:
#   - DeltaNet (linear attention) layers: efficient but less studied for SFT
#   - Full attention layers (every 4th block): standard behavior
#   - Liger Kernel may not cover DeltaNet ops (only standard attention/norms)
#   - torch.compile handles hybrid correctly (traces both paths)
#   - The 3:1 pattern means gradient flow differs from standard transformers
#   - LLRD should still work: "early" = first DeltaNet blocks
#
# Sub-1B SFT strategy:
#   - 1 epoch max, 2000 steps hard cap
#   - Very low LR (5e-6)
#   - High regularization (SymNoise alpha=7)
#   - Aggressive LLRD (0.85)
#   - Tighter grad clipping (0.5)
#   - Larger batch for stable gradients

model:
  name_or_path: Qwen/Qwen3.5-0.8B
  trust_remote_code: true
  torch_dtype: bfloat16
  attn_implementation: flash_attention_2
  use_liger_kernel: true  # May only patch the full-attention layers
  compile: true
  compile_backend: inductor
  compile_mode: default

data:
  dataset: your-org/agentic-traces
  dataset_split: train
  streaming: true
  max_seq_length: 2048
  messages_field: messages
  num_workers: 4
  packing: false
  seed: 42

train:
  output_dir: ./checkpoints/qwen35-08b-sft
  epochs: 1
  max_steps: 2000
  per_device_batch_size: 8
  gradient_accumulation_steps: 2
  learning_rate: 5.0e-6
  min_learning_rate: 5.0e-7
  weight_decay: 0.1
  warmup_ratio: 0.1
  max_grad_norm: 0.5
  lr_scheduler: cosine
  seed: 42
  save_steps: 500
  logging_steps: 1
  bf16: true
  gradient_checkpointing: none
  spike_detection: true
  spike_z_threshold: 4.0
  llrd_decay: 1.0  # Not needed with freeze_non_attention
  freeze_non_attention: true

parallel:
  fsdp: false
  context_parallel: false
  cpu_offload: false
  reshard_after_forward: true

memory:
  chunked_loss: true
  loss_num_chunks: 4
  float32_matmul_precision: high
  float8_training: false

plugins:
  sym_noise: true
  sym_noise_alpha: 7.0
  info_sft: true
  info_sft_pbar: 0.93
  schedule_free: false
  pre_rl: false

logging:
  project: palingenesis
  run_name: qwen35-08b-agentic
  use_wandb: true
  use_trackio: true
  log_grad_norm: true
